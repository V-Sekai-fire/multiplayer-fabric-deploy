name: Deploy CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: mix test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (egit needs libgit2 + fmt)
        run: sudo apt-get install -y libgit2-dev libfmt-dev

      - name: Clone taskweft sibling (path dep)
        run: |
          git clone --depth 1 \
            https://github.com/V-Sekai-fire/multiplayer-fabric-taskweft.git \
            ../multiplayer-fabric-taskweft

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-deploy-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-deploy-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run tests (exclude live-server integration tests)
        run: mix test --exclude integration --trace

  release:
    name: Burrito release (linux x86_64)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (egit needs libgit2 + fmt)
        run: sudo apt-get install -y libgit2-dev libfmt-dev

      - name: Clone taskweft sibling (path dep)
        run: |
          git clone --depth 1 \
            https://github.com/V-Sekai-fire/multiplayer-fabric-taskweft.git \
            ../multiplayer-fabric-taskweft

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-deploy-release-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-deploy-release-mix-

      - name: Install dependencies
        run: MIX_ENV=prod mix deps.get --only prod

      - name: Download ERTS for Burrito (CDN lacks 4-segment setup-beam versions)
        run: |
          curl -fsSL -o /tmp/erts_linux_x86_64.tar.gz \
            https://beam-machine-universal.b-cdn.net/OTP-27.3.4/linux/x86_64/any/otp_27.3.4_linux_any_x86_64.tar.gz

      - name: Build Burrito release
        run: MIX_ENV=prod mix release
        env:
          BURRITO_CUSTOM_ERTS: /tmp/erts_linux_x86_64.tar.gz

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: multiplayer-fabric-deploy-linux-x86_64
          path: burrito_out/multiplayer_fabric_deploy_linux
          if-no-files-found: error
